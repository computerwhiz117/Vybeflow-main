<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Save API - Test Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .save-indicator {
            display: inline-block;
            margin-left: 10px;
            font-size: 14px;
            color: #28a745;
        }
        .code-block {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            overflow-x: auto;
        }
        pre {
            margin: 0;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Story Save API Test</h1>
        <p style="color: #666; margin-bottom: 20px;">Test the <code>/api/story/save</code> endpoint</p>
        
        <div id="status-message"></div>
        
        <div class="form-group">
            <label for="story-id">Story ID (required)</label>
            <input type="text" id="story-id" placeholder="temp-123 or existing story ID" value="temp-demo-123">
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" placeholder="Story content...">This is my amazing story!</textarea>
        </div>
        
        <div class="form-group">
            <label for="caption">Caption</label>
            <input type="text" id="caption" placeholder="Story caption..." value="Check this out!">
        </div>
        
        <div class="form-group">
            <label for="media-url">Media URL</label>
            <input type="text" id="media-url" placeholder="/static/uploads/stories/video.mp4">
        </div>
        
        <button id="save-btn" onclick="testSaveStory()">
            💾 Save Story
        </button>
        <span id="save-status" class="save-indicator"></span>
        
        <div class="code-block">
            <strong>📋 Request Preview:</strong>
            <pre id="request-preview">{}</pre>
        </div>
        
        <div class="code-block">
            <strong>📥 Response:</strong>
            <pre id="response-preview">Click "Save Story" to see response...</pre>
        </div>
    </div>
    
    <script>
        // Update request preview on input
        const updatePreview = () => {
            const preview = {
                story_id: document.getElementById('story-id').value,
                content: document.getElementById('content').value,
                caption: document.getElementById('caption').value,
                media_url: document.getElementById('media-url').value || undefined
            };
            document.getElementById('request-preview').textContent = JSON.stringify(preview, null, 2);
        };
        
        document.getElementById('story-id').addEventListener('input', updatePreview);
        document.getElementById('content').addEventListener('input', updatePreview);
        document.getElementById('caption').addEventListener('input', updatePreview);
        document.getElementById('media-url').addEventListener('input', updatePreview);
        updatePreview();
        
        // Show status message
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status-message');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
            statusEl.style.display = 'block';
        }
        
        // Test save story function
        async function testSaveStory() {
            const btn = document.getElementById('save-btn');
            const saveStatus = document.getElementById('save-status');
            
            // Get form values
            const storyId = document.getElementById('story-id').value.trim();
            const content = document.getElementById('content').value;
            const caption = document.getElementById('caption').value;
            const mediaUrl = document.getElementById('media-url').value.trim();
            
            // Validate
            if (!storyId) {
                showStatus('❌ Story ID is required!', 'error');
                return;
            }
            
            // Disable button
            btn.disabled = true;
            saveStatus.textContent = '⏳ Saving...';
            
            try {
                const response = await fetch('/api/story/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        story_id: storyId,
                        content: content,
                        caption: caption,
                        media_url: mediaUrl || undefined
                    })
                });
                
                const data = await response.json();
                
                // Display response
                document.getElementById('response-preview').textContent = JSON.stringify(data, null, 2);
                
                if (response.ok && data.ok) {
                    showStatus('✅ Story saved successfully at ' + new Date(data.saved_at).toLocaleString(), 'success');
                    saveStatus.textContent = '✓ Saved';
                } else {
                    showStatus('❌ Error: ' + (data.error || 'Unknown error'), 'error');
                    saveStatus.textContent = '✗ Failed';
                }
                
            } catch (error) {
                showStatus('❌ Network error: ' + error.message, 'error');
                saveStatus.textContent = '✗ Network error';
                document.getElementById('response-preview').textContent = 'Error: ' + error.message;
            } finally {
                btn.disabled = false;
                setTimeout(() => {
                    saveStatus.textContent = '';
                }, 3000);
            }
        }
        
        // Show login status
        fetch('/api/whoami', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                if (data.username) {
                    showStatus('✓ Logged in as: ' + data.username, 'success');
                } else {
                    showStatus('⚠ Not logged in. Login at /login first (username: testuser, password: password123)', 'info');
                }
            })
            .catch(() => {
                showStatus('⚠ Make sure the server is running on http://localhost:5000', 'info');
            });
    </script>
</body>
</html>
