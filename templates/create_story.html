{% extends "base.html" %}
{% block body_class %}create-page{% endblock %}
{% block content %}
<style>
  .create-simple-shell{min-height:100vh;display:grid;place-items:center;padding:20px;}
  .create-simple-card{width:min(720px,96vw);border-radius:18px;border:1px solid rgba(255,173,117,.28);background:rgba(0,0,0,.38);backdrop-filter:blur(16px);box-shadow:0 0 38px rgba(255,106,0,.20),0 16px 42px rgba(0,0,0,.55);padding:18px;color:rgba(255,255,255,.92);}
  .create-link{color:#ffd8b2;}
</style>
<section class="create-simple-shell">
  <div class="create-simple-card">
    <h1 style="margin:0;">New story</h1>
    <p style="margin:10px 0 0; color: rgba(255,255,255,.72);">Story quick route is ready.</p>
    <p><a class="create-link" href="{{ url_for('create_story') }}">Open full Story Studio</a></p>
    <p><a class="create-link" href="{{ url_for('create_picker') }}">Back to Create</a></p>
  </div>
</section>
{% endblock %}
