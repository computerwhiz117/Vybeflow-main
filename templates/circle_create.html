{% extends "base.html" %}

{% block body_class %}circle-create-page{% endblock %}

{% block content %}
<style>
  :root {
    --bg: #2a1204;
    --card: rgba(255,255,255,.04);
    --text: rgba(255,255,255,.94);
    --muted: rgba(255,255,255,.60);
    --brand1:#ffb562; --brand2:#ff8226; --brand3:#ff4d00;
    --radius: 16px;
  }
  .create-wrap { max-width: 560px; margin: 0 auto; padding: 32px 16px 60px; }
  .create-wrap h1 {
    font-size: 26px; font-weight: 800; margin-bottom: 24px;
    background: linear-gradient(135deg, var(--brand1), var(--brand3));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600; color: var(--muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid rgba(255,160,90,.22);
    background: rgba(255,255,255,.06); color: var(--text);
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--brand2);
  }
  .form-group textarea { min-height: 80px; resize: vertical; }

  .vibe-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .vibe-chip {
    padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid rgba(255,160,90,.22);
    background: rgba(255,255,255,.06); color: var(--muted); transition: .2s;
  }
  .vibe-chip.active, .vibe-chip:hover {
    background: linear-gradient(135deg, var(--brand2), var(--brand3));
    color: #fff; border-color: transparent;
  }

  .btn-create {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--brand2), var(--brand3));
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    margin-top: 10px; transition: transform .15s;
  }
  .btn-create:hover { transform: scale(1.02); }
  .back-link { display: inline-block; margin-bottom: 16px; color: var(--brand2); font-size: 14px; text-decoration: none; }
</style>

<div class="create-wrap">
  <a href="{{ url_for('circles.circles_home') }}" class="back-link">← Back to Circles</a>
  <h1>Create a Crew 🔥</h1>

  <form method="POST" action="{{ url_for('circles.create_circle') }}">
    <div class="form-group">
      <label>Crew Name *</label>
      <input type="text" name="name" placeholder="e.g. Miami Nightlife Fam" required maxlength="100">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="What's this crew about?"></textarea>
    </div>

    <div class="form-group">
      <label>Vibe</label>
      <div class="vibe-chips" id="vibeChips">
        <div class="vibe-chip" data-vibe="rap" onclick="selectVibe(this)">🎤 Rap</div>
        <div class="vibe-chip" data-vibe="music" onclick="selectVibe(this)">🎵 Music</div>
        <div class="vibe-chip" data-vibe="business" onclick="selectVibe(this)">💼 Business</div>
        <div class="vibe-chip" data-vibe="faith" onclick="selectVibe(this)">🙏 Faith</div>
        <div class="vibe-chip" data-vibe="nightlife" onclick="selectVibe(this)">🌙 Nightlife</div>
        <div class="vibe-chip" data-vibe="gaming" onclick="selectVibe(this)">🎮 Gaming</div>
        <div class="vibe-chip" data-vibe="fitness" onclick="selectVibe(this)">💪 Fitness</div>
        <div class="vibe-chip" data-vibe="art" onclick="selectVibe(this)">🎨 Art</div>
      </div>
      <input type="hidden" name="vibe" id="vibeInput" value="">
    </div>

    <div class="form-group">
      <label>Privacy</label>
      <select name="privacy">
        <option value="private">🔒 Private (invite only)</option>
        <option value="public">🌍 Public (anyone can join)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Max Members</label>
      <input type="number" name="max_members" value="50" min="2" max="500">
    </div>

    <button type="submit" class="btn-create">Create Crew 🔥</button>
  </form>
</div>

<script>
function selectVibe(el) {
  document.querySelectorAll('.vibe-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('vibeInput').value = el.dataset.vibe;
}
</script>
{% endblock %}
