{% extends "base.html" %}

{% block body_class %}vibe-room-create-page{% endblock %}

{% block content %}
<style>
  :root {
    --vr-bg: #09090f;
    --vr-surface: rgba(22,22,35,.85);
    --vr-border: rgba(139,92,246,.15);
    --vr-text: rgba(255,255,255,.92);
    --vr-muted: rgba(255,255,255,.50);
    --vr-purple: #8b5cf6;
    --vr-purple-l: #a78bfa;
    --vr-orange: #f97316;
  }

  body.vibe-room-create-page { background: var(--vr-bg) !important; }
  body.vibe-room-create-page .auth-wrap {
    display: block; min-height: 0; background: transparent !important;
  }
  body.vibe-room-create-page .app-shell,
  body.vibe-room-create-page main {
    background: transparent !important; padding: 0; margin: 0;
  }

  .vc-create-wrap {
    max-width: 560px; margin: 0 auto; padding: 32px 16px 60px;
  }
  .vc-create-wrap h1 {
    font-size: 26px; font-weight: 800; margin-bottom: 24px;
    background: linear-gradient(135deg, var(--vr-purple-l), var(--vr-orange));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .vc-back-link {
    display: inline-block; margin-bottom: 16px; color: var(--vr-purple-l);
    font-size: 14px; text-decoration: none;
  }

  .vc-form-group { margin-bottom: 18px; }
  .vc-form-group label {
    display: block; font-size: 13px; font-weight: 600; color: var(--vr-muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
  }
  .vc-form-group input,
  .vc-form-group textarea,
  .vc-form-group select {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--vr-border);
    background: rgba(255,255,255,.06); color: var(--vr-text);
    font-size: 14px; outline: none; transition: border-color .2s;
    box-sizing: border-box;
  }
  .vc-form-group input:focus,
  .vc-form-group textarea:focus,
  .vc-form-group select:focus {
    border-color: var(--vr-purple);
  }
  .vc-form-group textarea { min-height: 80px; resize: vertical; }

  /* Room type selector */
  .vc-type-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-top: 6px;
  }
  .vc-type-option {
    padding: 14px 10px; border-radius: 14px; text-align: center;
    cursor: pointer; transition: .2s; font-size: 13px; font-weight: 600;
    border: 2px solid var(--vr-border); background: rgba(255,255,255,.04);
    color: var(--vr-muted);
  }
  .vc-type-option .type-icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .vc-type-option.active,
  .vc-type-option:hover {
    border-color: var(--vr-purple); background: rgba(139,92,246,.1);
    color: var(--vr-text);
  }

  .vc-toggle-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; background: var(--vr-surface); border-radius: 12px;
    margin-bottom: 12px; border: 1px solid var(--vr-border);
  }
  .vc-toggle-row label {
    flex: 1; margin: 0; font-size: 14px; color: var(--vr-text);
    text-transform: none; letter-spacing: 0;
  }
  .vc-toggle-row input[type="checkbox"] {
    width: 20px; height: 20px; accent-color: var(--vr-purple);
  }

  .vc-create-btn {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--vr-purple), #6d28d9);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    margin-top: 10px; transition: transform .15s;
  }
  .vc-create-btn:hover { transform: scale(1.02); }
</style>

<div class="vc-create-wrap">
  <a href="{{ url_for('vibe_rooms.rooms_lobby') }}" class="vc-back-link">&#8592; Back to Vibe Rooms</a>
  <h1>Start a Vibe Room &#x1F3A7;</h1>

  <form method="POST" action="{{ url_for('vibe_rooms.create_room') }}">
    <div class="vc-form-group">
      <label>Room Name *</label>
      <input type="text" name="name" placeholder="e.g. Late Night Freestyle Session" required maxlength="150">
    </div>

    <div class="vc-form-group">
      <label>Room Type</label>
      <div class="vc-type-grid" id="roomTypeGrid">
        {% for key, info in room_types.items() %}
        <div class="vc-type-option{% if key == 'chill' %} active{% endif %}"
             data-type="{{ key }}" onclick="selectType(this)">
          <span class="type-icon">{{ info.icon }}</span>
          {{ info.label }}
        </div>
        {% endfor %}
      </div>
      <input type="hidden" name="room_type" id="roomTypeInput" value="chill">
    </div>

    <div class="vc-form-group">
      <label>Description</label>
      <textarea name="description" placeholder="What's the vibe?"></textarea>
    </div>

    <div class="vc-form-group">
      <label>Max Speakers</label>
      <input type="number" name="max_speakers" value="10" min="1" max="50">
    </div>

    <div class="vc-form-group">
      <label>Max Listeners</label>
      <input type="number" name="max_listeners" value="100" min="1" max="10000">
    </div>

    <div class="vc-toggle-row">
      <label>&#x1F534; Go Live Now</label>
      <input type="checkbox" name="go_live_now" checked>
    </div>

    <div class="vc-form-group">
      <label>Or Schedule For Later</label>
      <input type="datetime-local" name="scheduled_at">
    </div>

    <button type="submit" class="vc-create-btn">Launch Room &#x1F525;</button>
  </form>
</div>

<script>
function selectType(el) {
  document.querySelectorAll('.vc-type-option').forEach(function(o) {
    o.classList.remove('active');
  });
  el.classList.add('active');
  document.getElementById('roomTypeInput').value = el.dataset.type;
}
</script>
{% endblock %}
